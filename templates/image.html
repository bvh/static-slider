<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>{{ img.title }} &mdash; {{ site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../{{ site.stylesheet }}">
    <meta name="generator" content="Static Slider 0.1.0">
</head>
<body class="image">
    <main>
        <div class="image">
            <header>
                <h1>{{ img.title }}</h1>
                <p class="date">{{ img.month }}, {{ img.year }}</p>
            </header>
            <a class="zoom" href="{{ img.filename }}"><img src="{{ img.filename }}" alt="{{ img.description }}"></a>
            <p class="description">{{ img.description }}</p>
            <p class="exposure">{{ img.shutterspeed }}, {{ img.aperture }}, ISO {{ img.iso }}, {{ img.focallength35 }}</p>
            <footer>
                <p class="copyright">Copyright &copy; {{ img.year }} {{ img.artist }}</p>
                <p class="return"><a href="../"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"></polyline><path d="M20 20v-7a4 4 0 0 0-4-4H4"></path></svg>{{ gallery.title }}</a></p>
            </footer>
        </div>
    </main>
</body>
</html>

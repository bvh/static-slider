<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>{{ img.title }} &mdash; {{ site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../{{ site.stylesheet }}">
    <meta name="generator" content="Static Slider 0.1.0">
</head>
<body class="image">
    <main>
        <figure>
            <header>
                <h1>{{ img.title }}</h1>
                <p class="date">{{ img.month }}, {{ img.year }}</p>
            </header>
            <a href="{{ img.filename }}"><img src="{{ img.filename }}" alt="{{ img.description }}"></a>
            <figcaption>
                <p class="description">{{ img.description }}</p>
                <ul class="exposure">
                    <li class="shutterspeed">{{ img.shutterspeed }}</li>
                    <li class="aperture">{{ img.aperture }}</li>
                    <li class="iso">ISO {{ img.iso }}</li>
                    <li class="focallength35">{{ img.focallength35 }}</li>
                </ul>
            </figcaption>
            <footer>
                <p class="copyright">Copyright &copy; {{ img.year }} {{ img.artist }}</p>
            </footer>
        </figure>
    </main>
</body>
</html>
